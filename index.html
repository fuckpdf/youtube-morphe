<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patched APKs Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body { background-color: #000000; color: #f8fafc; font-family: sans-serif; }
        .glass-panel { background: #000000; border: 1px solid rgba(255, 255, 255, 0.1); }
        .markdown-body details { border: 1px solid #333; padding: 10px; border-radius: 8px; background: #000; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-5xl mx-auto p-6">
        <div v-if="loading" class="text-center text-blue-400">Loading builds...</div>
        
        <div v-else-if="errorMsg" class="p-6 border border-red-900 bg-black text-center">
            <h2 class="text-red-500 font-bold">Error</h2>
            <p class="text-gray-300">{{ errorMsg }}</p>
            <button @click="init()" class="mt-4 bg-blue-600 px-4 py-2 rounded">Retry</button>
        </div>

        <div v-else>
            <h1 class="text-3xl font-bold mb-8">Patched APKs Hub</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div v-for="(app, key) in appData" :key="key" class="glass-panel p-4 rounded-lg flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img :src="app.icon" class="w-10 h-10">
                        <div>
                            <div class="font-bold">{{ app.displayName }}</div>
                            <div class="text-xs text-gray-400">{{ app.versionText }}</div>
                        </div>
                    </div>
                    <a :href="app.downloadUrl" class="bg-blue-600 px-3 py-1 rounded text-sm">Download</a>
                </div>
            </div>
            
            <div class="mt-10" v-html="changelogHTML"></div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const REPO = "fuckpdf/youtube-morphe";
                const appData = ref({});
                const loading = ref(true);
                const errorMsg = ref(null);
                const changelogHTML = ref(null);

                const init = async () => {
                    loading.value = true;
                    errorMsg.value = null;

                    try {
                        // GitHub'ın kendi API endpoint'i (CORS destekler)
                        const response = await fetch(`https://api.github.com/repos/${REPO}/releases`, {
                            headers: { "Accept": "application/vnd.github.v3+json" }
                        });

                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        
                        const releases = await response.json();
                        let tempAppData = {};
                        let combinedNotes = "";

                        releases.forEach(rel => {
                            rel.assets.forEach(asset => {
                                const name = asset.name.toLowerCase();
                                let key = null;
                                if (name.startsWith("youtube-")) key = "youtube";
                                else if (name.startsWith("yt.music-")) key = "youtube-music";
                                else if (name.startsWith("instagram-")) key = "instagram";
                                
                                if (key && !tempAppData[key]) {
                                    tempAppData[key] = {
                                        displayName: key.toUpperCase(),
                                        versionText: rel.tag_name,
                                        icon: "https://cdn.simpleicons.org/" + key.replace("-", ""),
                                        downloadUrl: asset.browser_download_url
                                    };
                                }
                            });
                            if (rel.body) combinedNotes += rel.body + "<hr>";
                        });

                        appData.value = tempAppData;
                        changelogHTML.value = marked.parse(combinedNotes);
                        loading.value = false;
                    } catch (e) {
                        errorMsg.value = e.message;
                        loading.value = false;
                    }
                };

                onMounted(init);
                return { appData, loading, errorMsg, changelogHTML, init };
            }
        }).mount('#app');
    </script>
</body>
</html>
