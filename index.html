<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Automatically built and patched APKs, updated via GitHub Actions.">
    <title>Patched APKs Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://unpkg.com/vue@3.5.34/dist/vue.global.js"></script>

    <style>
        :root { --accent: #38bdf8; }

        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }

        body {
            background-color: #030304;
            color: #f4f4f5;
            position: relative;
            overflow-x: hidden;
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .ambient span {
            position: absolute;
            border-radius: 9999px;
            filter: blur(120px);
            opacity: 0.16;
        }
        .ambient .b1 { width: 480px; height: 480px; top: -120px; left: -100px; background: #ff2d55; }
        .ambient .b2 { width: 520px; height: 520px; top: 10%; right: -160px; background: #1d9bf0; }
        .ambient .b3 { width: 460px; height: 460px; bottom: -140px; left: 20%; background: #e1306c; }

        #app { position: relative; z-index: 1; }

        .glass-panel {
            background: rgba(12, 12, 14, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
        }
        .glass-panel-muted { background: rgba(255,255,255,0.015); border: 1px dashed rgba(255, 255, 255, 0.1); }

        .app-card:hover { transform: translateY(-3px); }
        .app-card .icon-well { transition: transform 0.35s ease, background 0.35s ease; }
        .app-card:hover .icon-well { transform: scale(1.06) rotate(-2deg); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .shimmer {
            background: linear-gradient(90deg, #0c0c0e 0%, #1c1c20 50%, #0c0c0e 100%);
            background-size: 800px 100%;
            animation: shimmer 1.6s infinite linear;
        }

        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }

        .markdown-body h3 { font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 1.75rem; margin-bottom: 0.6rem; letter-spacing: -0.01em; }
        .markdown-body h3:first-child { margin-top: 0; }
        .markdown-body p { margin-bottom: 1rem; color: #a1a1aa; line-height: 1.65; }
        .markdown-body ul { list-style: none; padding-left: 0; margin-bottom: 1rem; color: #a1a1aa; }
        .markdown-body li { margin-bottom: 0.4rem; padding-left: 1.3rem; position: relative; line-height: 1.55; }
        .markdown-body li::before { content: ''; position: absolute; left: 0; top: 0.55em; width: 6px; height: 6px; border-radius: 9999px; background: var(--accent); opacity: 0.7; }
        .markdown-body hr { border-color: rgba(255,255,255,0.08); margin: 1.75rem 0; }
        .markdown-body a { color: #7dd3fc; text-decoration: none; border-bottom: 1px solid rgba(125,211,252,0.25); transition: border-color 0.2s, color 0.2s; }
        .markdown-body a:hover { color: #bae6fd; border-color: rgba(186,230,253,0.6); }
        .markdown-body details { margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.08); padding: 12px 14px; border-radius: 12px; background: rgba(255,255,255,0.02); }
        .markdown-body summary { font-weight: 600; cursor: pointer; outline: none; color: #e4e4e7; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-sky-500/30">

    <div class="ambient"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>

    <div id="app" class="flex-grow w-full max-w-5xl mx-auto p-4 md:p-8 flex flex-col">
        <template v-if="loading">
            <header class="text-center mb-10 pt-8">
                <div class="h-11 shimmer rounded-xl w-3/4 md:w-1/2 mx-auto mb-4"></div>
                <div class="h-4 shimmer rounded-lg w-1/2 md:w-1/3 mx-auto"></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                <div v-for="i in 15" :key="i" class="glass-panel p-5 rounded-2xl flex items-center gap-4">
                    <div class="w-14 h-14 shimmer rounded-xl"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-5 shimmer rounded w-1/2"></div>
                        <div class="h-3 shimmer rounded w-1/3"></div>
                    </div>
                    <div class="w-24 h-10 shimmer rounded-xl"></div>
                </div>
            </div>
        </template>

        <template v-else-if="errorMsg">
            <div class="flex flex-col items-center justify-center flex-grow animate-fade-in">
                <div class="glass-panel p-8 rounded-2xl text-center max-w-md border-red-900/40">
                    <svg class="w-14 h-14 text-red-500/90 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 class="text-xl font-bold text-white mb-2 tracking-tight">{{ isRateLimit ? 'Rate Limited' : 'Connection Error' }}</h2>
                    <p class="text-zinc-500 text-sm mb-6">{{ errorMsg }}</p>
                    <button @click="init()" class="bg-sky-500/10 text-sky-400 hover:bg-sky-500 hover:text-white border border-sky-500/25 px-5 py-2.5 rounded-xl font-semibold text-sm transition-all">
                        Retry
                    </button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="text-center mb-10 pt-8 animate-fade-in">
                <div class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded-full border border-white/10 bg-white/[0.03] text-xs font-medium text-zinc-400 tracking-wide">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    Live &middot; Auto-updated by GitHub Actions
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-3 text-transparent bg-clip-text bg-gradient-to-br from-white via-zinc-200 to-zinc-500">
                    Patched APKs Hub
                </h1>
                <p class="text-zinc-500 text-lg">Open-source patched builds · Updated automatically</p>
            </header>

            <div class="glass-panel rounded-2xl p-5 mb-8 flex flex-col sm:flex-row justify-between items-center gap-4 animate-fade-in" style="animation-delay: 0.08s;">
                <div>
                    <h2 class="text-base font-semibold text-zinc-200">Active Build Status</h2>
                    <p class="text-sm text-zinc-500">Last updated: {{ latestDate }}</p>
                </div>
                <span class="px-4 py-1.5 bg-sky-500/10 text-sky-400 border border-sky-500/25 rounded-full font-mono text-xs font-bold flex items-center gap-2 tracking-wide">
                    <span class="w-2 h-2 rounded-full bg-sky-400 animate-pulse"></span>
                    UNIFIED RELEASE
                </span>
            </div>

            <div class="glass-panel rounded-2xl mb-6 overflow-hidden animate-fade-in" style="animation-delay: 0.12s;">
                <button @click="guideOpen = !guideOpen"
                        class="w-full flex items-center justify-between gap-3 p-4 text-left hover:bg-white/[0.02] transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-sky-500/10 border border-sky-500/20 text-base flex-shrink-0">📖</div>
                        <div>
                            <p class="text-sm font-bold text-zinc-200">How to Install</p>
                            <p class="text-xs text-zinc-600 mt-0.5">Tap to expand installation guide</p>
                        </div>
                    </div>
                    <svg class="w-4 h-4 text-zinc-500 flex-shrink-0 transition-transform duration-200"
                         :style="{ transform: guideOpen ? 'rotate(180deg)' : 'rotate(0deg)' }"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div v-if="guideOpen" class="px-4 pb-4 border-t border-white/5">
                    <div class="mt-4 rounded-xl border border-purple-500/20 bg-purple-500/5 p-4">
                        <div class="flex items-center gap-3 mb-3 pb-3 border-b border-purple-500/15">
                            <span class="text-lg">📦</span>
                            <div>
                                <p class="text-sm font-bold text-purple-300">Standalone APK</p>
                                <span class="text-xs font-bold text-purple-400 bg-purple-500/10 border border-purple-500/20 px-2 py-0.5 rounded uppercase tracking-wide">No root needed</span>
                            </div>
                        </div>
                        <ol class="space-y-2.5 text-xs text-zinc-400">
                            <li class="flex gap-2.5">
                                <span class="flex-shrink-0 w-5 h-5 rounded bg-purple-500/15 text-purple-300 font-bold flex items-center justify-center text-[10px]">1</span>
                                <span>Install <strong class="text-zinc-200">MicroG</strong> if the app requires Google Services — available in the downloads list below.</span>
                            </li>
                            <li class="flex gap-2.5">
                                <span class="flex-shrink-0 w-5 h-5 rounded bg-purple-500/15 text-purple-300 font-bold flex items-center justify-center text-[10px]">2</span>
                                <span>Download the <strong class="text-zinc-200">.apk</strong> and install it — or tap the <strong class="text-emerald-400">Obtainium</strong> button to track updates automatically.</span>
                            </li>
                            <li class="flex gap-2.5">
                                <span class="flex-shrink-0 w-5 h-5 rounded bg-purple-500/15 text-purple-300 font-bold flex items-center justify-center text-[10px]">3</span>
                                <span>Done. No root or special setup required.</span>
                            </li>
                        </ol>
                        <div class="mt-3 pt-3 border-t border-purple-500/15">
                            <p class="text-[10px] text-zinc-600 uppercase font-bold tracking-wider mb-2">Optional dependency</p>
                            <a href="https://github.com/MorpheApp/MicroG-RE/releases/latest" target="_blank" rel="noopener"
                               class="inline-flex items-center gap-1.5 text-xs font-semibold text-purple-300 border border-purple-500/20 bg-purple-500/8 px-3 py-1.5 rounded-lg hover:bg-purple-500/20 transition-colors">
                                MicroG-RE
                                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 010 1.5h-3.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-8.5C2 2.784 2.784 2 3.75 2zm6.854-1h4a.75.75 0 01.75.75v4a.75.75 0 01-1.5 0V2.56l-5.22 5.22a.75.75 0 01-1.06-1.06L12.44 1.5h-1.836a.75.75 0 010-1.5z"/></svg>
                            </a>
                        </div>
                    </div>
                    <p class="mt-3 text-xs text-zinc-600 flex items-start gap-2">
                        <span class="flex-shrink-0">💡</span>
                        <span>Most apps work without MicroG. Only apps that need Google sign-in or push notifications require it.</span>
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-12">
                <template v-for="(appKey, index) in ORDER" :key="appKey">
                    <div v-if="appData[appKey]"
                         class="app-card glass-panel p-5 rounded-2xl flex flex-col sm:flex-row items-center gap-4 animate-fade-in group"
                         :style="{ animationDelay: `${0.14 + (index * 0.06)}s`, '--accent': ACCENTS[appKey] }"
                         @mouseenter="$event.currentTarget.style.borderColor = ACCENTS[appKey] + '55'; $event.currentTarget.style.boxShadow = '0 12px 40px -12px ' + ACCENTS[appKey] + '33'"
                         @mouseleave="$event.currentTarget.style.borderColor = ''; $event.currentTarget.style.boxShadow = ''">
                        <div class="flex items-center gap-4 w-full sm:w-auto flex-1">
                            <div class="icon-well w-14 h-14 rounded-xl flex items-center justify-center p-2.5 border border-white/5"
                                 :style="{ background: `radial-gradient(circle at 30% 20%, ${ACCENTS[appKey]}22, #0a0a0b)` }">
                                <img :src="appData[appKey].icon" :alt="appData[appKey].displayName" class="w-full h-full object-contain">
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-zinc-100 tracking-tight">{{ appData[appKey].displayName }}</h3>
                                <p class="text-zinc-500 text-xs sm:text-sm font-mono">{{ appData[appKey].versionText }}</p>
                                <p v-if="appData[appKey].downloadCount > 0" class="text-zinc-600 text-xs mt-0.5">{{ appData[appKey].downloadCount.toLocaleString() }} downloads</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 w-full sm:w-auto mt-4 sm:mt-0">
                            <a :href="appData[appKey].downloadUrl"
                               class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl font-semibold text-sm text-center transition-all border"
                               :style="{ color: ACCENTS[appKey], borderColor: ACCENTS[appKey] + '40', background: ACCENTS[appKey] + '14' }"
                               onmouseover="this.style.background=this.style.borderColor.replace('40','cc'); this.style.color='#fff';"
                               :onmouseleave="`this.style.background='${ACCENTS[appKey]}14'; this.style.color='${ACCENTS[appKey]}';`">
                                Download
                            </a>
                            <a :href="getObtainiumUrl(appKey)" title="Track with Obtainium"
                               class="flex items-center justify-center bg-white/[0.03] text-zinc-400 hover:text-white hover:bg-white/10 border border-white/10 w-11 h-11 rounded-xl transition-all flex-shrink-0">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                            </a>
                        </div>
                    </div>
                    <div v-else class="glass-panel-muted p-5 rounded-2xl flex items-center gap-4 opacity-50 animate-fade-in" :style="{ animationDelay: `${0.14 + (index * 0.06)}s` }">
                        <div class="w-14 h-14 bg-[#0a0a0b] rounded-xl flex items-center justify-center p-2.5 border border-white/5">
                            <img :src="ICONS[appKey]" :alt="DISPLAY_NAMES[appKey]" class="w-full h-full object-contain grayscale opacity-30">
                        </div>
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-zinc-600 tracking-tight">{{ DISPLAY_NAMES[appKey] }}</h3>
                            <p class="text-zinc-700 text-xs sm:text-sm font-medium">Not found</p>
                        </div>
                    </div>
                </template>
            </div>

            <div v-if="changelogHTML" class="animate-fade-in" style="animation-delay: 0.32s;">
                <h2 class="text-2xl font-bold text-zinc-100 mb-4 flex items-center gap-2.5 tracking-tight">
                    <svg class="w-6 h-6 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Latest Release Notes
                </h2>
                <div class="glass-panel rounded-2xl p-6 md:p-8 markdown-body text-sm md:text-base" v-html="changelogHTML"></div>
            </div>

            <footer class="mt-16 pb-8 text-center text-zinc-600 text-sm animate-fade-in" style="animation-delay: 0.4s;">
                <p>Automatically built via GitHub Actions.</p>
                <p class="mt-1">Source code:
                    <a :href="'https://github.com/' + REPO" target="_blank" rel="noopener noreferrer" class="text-zinc-400 hover:text-white hover:underline transition-colors">youtube-morphe</a>
                </p>
            </footer>
        </template>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const REPO = "fuckpdf/youtube-morphe";

                const ICONS = {
                    "youtube": "https://cdn.simpleicons.org/youtube/FF0000",
                    "youtube-music": "https://cdn.simpleicons.org/youtubemusic/FF0000",
                    "reddit": "https://cdn.simpleicons.org/reddit/FF4500",
                    "twitter": "https://cdn.simpleicons.org/x/ffffff",
                    "instagram": "https://cdn.simpleicons.org/instagram/E4405F",
                    "microg": "https://cdn.simpleicons.org/google/4285F4",
                    "github": "https://cdn.simpleicons.org/github/ffffff",
                    "niagara-launcher": "https://www.google.com/s2/favicons?sz=128&domain=niagaralauncher.app",
                    "pydroid3": "https://www.google.com/s2/favicons?sz=128&domain=pydroid3.com",
                    "smart-launcher": "https://www.google.com/s2/favicons?sz=128&domain=smartlauncher.net",
                    "wps-office": "https://www.google.com/s2/favicons?sz=128&domain=wps.com",
                    "gboard": "https://cdn.simpleicons.org/google/4285F4",
                    "speedtest": "https://www.google.com/s2/favicons?sz=128&domain=speedtest.net",
                    "solid-explorer": "https://www.google.com/s2/favicons?sz=128&domain=solidexplorer.com",
                    "brave": "https://cdn.simpleicons.org/brave/FB542B"
                };

                const DISPLAY_NAMES = {
                    "youtube": "YouTube",
                    "youtube-music": "YT.Music",
                    "reddit": "Reddit",
                    "twitter": "Twitter",
                    "instagram": "Instagram",
                    "microg": "MicroG (GmsCore)",
                    "github": "GitHub",
                    "niagara-launcher": "Niagara Launcher",
                    "pydroid3": "PyDroid3",
                    "smart-launcher": "Smart Launcher",
                    "wps-office": "WPS Office",
                    "gboard": "Gboard",
                    "speedtest": "Speedtest",
                    "solid-explorer": "Solid Explorer",
                    "brave": "Brave"
                };

                const ACCENTS = {
                    "youtube": "#ff3b3b",
                    "youtube-music": "#ff6b95",
                    "reddit": "#ff5700",
                    "twitter": "#1d9bf0",
                    "instagram": "#e1306c",
                    "microg": "#34a853",
                    "github": "#e6edf3",
                    "niagara-launcher": "#2196f3",
                    "pydroid3": "#3776ab",
                    "smart-launcher": "#ff9800",
                    "wps-office": "#ff5b33",
                    "gboard": "#4285f4",
                    "speedtest": "#8bc53f",
                    "solid-explorer": "#4caf50",
                    "brave": "#fb542b"
                };

                const ORDER = [
                    "youtube", "youtube-music", "instagram", "twitter", "reddit",
                    "github", "niagara-launcher", "pydroid3", "smart-launcher", "wps-office",
                    "gboard", "speedtest", "solid-explorer", "brave",
                    "microg"
                ];

                const loading = ref(true);
                const errorMsg = ref(null);
                const isRateLimit = ref(false);
                const latestDate = ref("");
                const appData = ref({});
                const changelogHTML = ref(null);
                const guideOpen = ref(false);

                const init = async () => {
                    loading.value = true;
                    errorMsg.value = null;

                    try {
                        const response = await fetch(`https://api.github.com/repos/${REPO}/releases/tags/latest`, {
                            headers: { "Accept": "application/vnd.github+json" },
                            cache: "no-store"
                        });

                        if (!response.ok) {
                            const remaining = response.headers.get("X-RateLimit-Remaining");
                            if (response.status === 403 && remaining === "0") {
                                isRateLimit.value = true;
                                throw new Error("GitHub API rate limit reached. Please try again in a few minutes.");
                            }
                            throw new Error(`Could not reach the GitHub API (status ${response.status}). Ensure the 'latest' release exists.`);
                        }

                        const release = await response.json();

                        if (!release.assets || release.assets.length === 0) {
                            throw new Error("No APKs found in the latest release.");
                        }

                        latestDate.value = new Date(release.published_at).toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
                        let tempAppData = {};

                        release.assets.forEach(asset => {
                            const nameLower = asset.name.toLowerCase();
                            if (!nameLower.endsWith('.apk')) return;

                            let appKey = null;
                            if (nameLower.startsWith("yt.music-")) appKey = "youtube-music";
                            else if (nameLower.startsWith("youtube-")) appKey = "youtube";
                            else if (nameLower.startsWith("reddit-")) appKey = "reddit";
                            else if (nameLower.startsWith("twitter-")) appKey = "twitter";
                            else if (nameLower.startsWith("instagram-")) appKey = "instagram";
                            else if (nameLower.startsWith("github-")) appKey = "github";
                            else if (nameLower.startsWith("niagara launcher-")) appKey = "niagara-launcher";
                            else if (nameLower.startsWith("pydroid3-")) appKey = "pydroid3";
                            else if (nameLower.startsWith("smart launcher-")) appKey = "smart-launcher";
                            else if (nameLower.startsWith("wps office-")) appKey = "wps-office";
                            else if (nameLower.startsWith("gboard-")) appKey = "gboard";
                            else if (nameLower.startsWith("speedtest-")) appKey = "speedtest";
                            else if (nameLower.startsWith("solid explorer-")) appKey = "solid-explorer";
                            else if (nameLower.startsWith("brave-")) appKey = "brave";
                            else if (nameLower === "microg.apk") appKey = "microg";

                            if (appKey && !tempAppData[appKey]) {
                                let versionText = "GmsCore / Support component";
                                if (appKey !== "microg") {
                                    const rawVersion = asset.name.split('-').slice(1).join('-').replace('.apk', '');
                                    versionText = "v" + rawVersion;
                                }

                                tempAppData[appKey] = {
                                    name: asset.name,
                                    displayName: DISPLAY_NAMES[appKey],
                                    icon: ICONS[appKey],
                                    versionText: versionText,
                                    downloadCount: asset.download_count || 0,
                                    downloadUrl: asset.browser_download_url
                                };
                            }
                        });

                        appData.value = tempAppData;
                        if (release.body) {
                            const rawHtml = marked.parse(release.body);
                            changelogHTML.value = DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['target'] });
                        }

                        loading.value = false;

                    } catch (error) {
                        console.error(error);
                        errorMsg.value = error.message;
                        loading.value = false;
                    }
                };

                const getObtainiumUrl = (appKey) => {
                    function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
                    const name = DISPLAY_NAMES[appKey] || appKey;
                    const filter = appKey === "microg"
                        ? escRe("MicroG") + "\\.apk"
                        : escRe(name) + "-.*\\.apk";
                    return `obtainium://add/https://github.com/${REPO}?apkFilterRegEx=${encodeURIComponent(filter)}&releaseTitleFilterRegEx=${encodeURIComponent("latest")}`;
                };

                onMounted(() => init());

                return {
                    REPO, ICONS, DISPLAY_NAMES, ACCENTS, ORDER,
                    loading, errorMsg, isRateLimit, latestDate, appData, changelogHTML,
                    guideOpen, getObtainiumUrl, init
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
