<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patched APKs Hub</title>
    <!-- Sürüm notlarını biçimlendirmek için Markdown kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --obtainium-color: #007acc;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .status-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }

        .status-title {
            font-weight: 600;
            color: #fff;
            font-size: 1.2rem;
        }

        .tag-badge {
            background-color: var(--border-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--accent-color);
            font-weight: bold;
        }

        .section-title {
            font-size: 1.5rem;
            color: #fff;
            margin: 2rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .apps-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .app-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
            flex-wrap: wrap;
        }

        .app-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .app-main-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 200px;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 8px;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-weight: 600;
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .app-version {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .actions-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .download-btn {
            background-color: var(--success-color);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: opacity 0.2s;
        }

        /* Şık Obtainium Buton Tasarımı */
        .obtainium-btn {
            background-color: #1f2937;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 0.5rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s;
            width: 38px;
            height: 38px;
        }

        .obtainium-btn:hover {
            background-color: rgba(0, 122, 204, 0.15);
            border-color: var(--obtainium-color);
        }

        .obtainium-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        /* Sürüm Notları (Changelog) Tasarımı */
        .changelog-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
            font-size: 0.95rem;
        }

        .changelog-content h3 {
            color: #fff;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .changelog-content h3:first-child {
            margin-top: 0;
        }

        .changelog-content p {
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .changelog-content ul {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .changelog-content li {
            margin-bottom: 0.25rem;
        }

        .changelog-content hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 1.5rem 0;
        }

        .changelog-content a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .changelog-content a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .error-msg {
            text-align: center;
            color: #ff7b72;
            padding: 2rem;
            background-color: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            border-radius: 8px;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Patched APKs Hub</h1>
            <p class="subtitle">Morphe & Piko ile otomatik olarak derlenen en güncel Android uygulamaları</p>
        </header>

        <main id="main-content">
            <div class="loading">Sürüm bilgileri ve indirme bağlantıları yükleniyor...</div>
        </main>

        <footer>
            <p>GitHub Actions tarafından otomatik olarak derlenmiştir.</p>
            <p>Kaynak kodlar ve otomatik tetikleyici için <a href="https://github.com/fuckpdf/youtube-morphe" target="_blank">youtube-morphe</a> deposunu ziyaret edin.</p>
        </footer>
    </div>

    <script>
        const REPO = "fuckpdf/youtube-morphe";

        const ICONS = {
            "youtube": "https://cdn.simpleicons.org/youtube/FF0000",
            "youtube-music": "https://cdn.simpleicons.org/youtubemusic/FF0000",
            "reddit": "https://cdn.simpleicons.org/reddit/FF4500",
            "twitter": "https://cdn.simpleicons.org/x/ffffff",
            "instagram": "https://cdn.simpleicons.org/instagram/E4405F",
            "microg": "https://cdn.simpleicons.org/google/4285F4"
        };

        const DISPLAY_NAMES = {
            "youtube": "YouTube",
            "youtube-music": "YouTube Music",
            "reddit": "Reddit",
            "twitter": "Twitter / X",
            "instagram": "Instagram",
            "microg": "MicroG (GmsCore)"
        };

        const ORDER = ["youtube", "youtube-music", "instagram", "twitter", "reddit", "microg"];

        async function init() {
            const main = document.getElementById("main-content");
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/releases`);
                if (!response.ok) throw new Error("GitHub API bağlantı hatası: " + response.status);
                
                const releases = await response.json();
                if (!releases || releases.length === 0) {
                    main.innerHTML = `<div class="error-msg">Henüz yayınlanmış bir sürüm (release) bulunamadı.</div>`;
                    return;
                }

                const latestRelease = releases[0];
                const assets = latestRelease.assets || [];

                let html = `
                    <div class="status-container">
                        <div class="status-header">
                            <span class="status-title">Aktif Derleme</span>
                            <span class="tag-badge">${latestRelease.tag_name}</span>
                        </div>
                        <div style="font-size: 0.95rem; color: var(--text-muted)">
                            Yayınlanma Tarihi: ${new Date(latestRelease.published_at).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })}
                        </div>
                    </div>
                    
                    <div class="section-title">Uygulamalar</div>
                    <div class="apps-list" id="apps-container">
                `;

                const appData = {};

                assets.forEach(asset => {
                    if (!asset.name.endsWith('.apk')) return;

                    let appKey = "microg";
                    if (asset.name.includes("youtube-music")) appKey = "youtube-music";
                    else if (asset.name.includes("youtube")) appKey = "youtube";
                    else if (asset.name.includes("reddit")) appKey = "reddit";
                    else if (asset.name.includes("twitter")) appKey = "twitter";
                    else if (asset.name.includes("instagram")) appKey = "instagram";

                    const icon = ICONS[appKey] || ICONS["microg"];
                    const displayName = DISPLAY_NAMES[appKey] || asset.name;
                    
                    let versionText = "GmsCore / Destekleyici";
                    const cleanName = asset.name.replace("-patched", "").replace(".apk", "").replace(".apkm", "");
                    
                    if (appKey !== "microg") {
                        const rawVersion = cleanName.substring(appKey.length + 1);
                        if (rawVersion) {
                            versionText = "Sürüm: " + rawVersion;
                        }
                    } else if (appKey === "microg") {
                        versionText = "Sürüm: " + cleanName.replace("microg-", "");
                    }

                    appData[appKey] = {
                        displayName,
                        icon,
                        versionText,
                        downloadUrl: asset.browser_download_url
                    };
                });

                ORDER.forEach(appKey => {
                    const app = appData[appKey];
                    if (!app) return;

                    // Her bir uygulama için dinamik Obtainium derin bağlantısı (deep link) üretiyoruz
                    // Kullanıcı tıkladığında Obtainium doğrudan bu uygulamayı takibe alacak ayarla açılır.
                    const obtainiumUrl = `obtainium://add/https://github.com/${REPO}?filenameFilter=${appKey}`;

                    html += `
                        <div class="app-card">
                            <div class="app-main-info">
                                <div class="app-icon">
                                    <img src="${app.icon}" alt="${app.displayName}">
                                </div>
                                <div class="app-info">
                                    <div class="app-name">${app.displayName}</div>
                                    <div class="app-version">${app.versionText}</div>
                                </div>
                            </div>
                            <div class="actions-wrapper">
                                <!-- Şık yeşil renkli klasik indirme butonu -->
                                <a href="${app.downloadUrl}" class="download-btn">İndir</a>
                                
                                <!-- Mavi detaylı, şık Obtainium ikonu/butonu -->
                                <a href="${obtainiumUrl}" class="obtainium-btn" title="Obtainium'a Ekle">
                                    <img src="https://cdn.simpleicons.org/dependabot/007ACC" alt="Obtainium">
                                </a>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;

                if (latestRelease.body) {
                    const renderedChangelog = marked.parse(latestRelease.body);
                    html += `
                        <div class="section-title">Yama Sürüm Notları & Güncellemeler</div>
                        <div class="changelog-container">
                            <div class="changelog-content">
                                ${renderedChangelog}
                            </div>
                        </div>
                    `;
                }

                main.innerHTML = html;

            } catch (error) {
                console.error(error);
                main.innerHTML = `
                    <div class="error-msg">
                        <strong>Hata Oluştu!</strong><br>
                        Veriler GitHub sunucularından çekilemedi: ${error.message}
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
